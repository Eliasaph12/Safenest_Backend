# SafeNest Backend Production Configuration
# All sensitive values should be provided via environment variables

# Database Configuration
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MySQL/JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Server Configuration
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/
server.compression.enabled=true
server.compression.min-response-size=1024

# Logging Configuration
logging.level.root=WARN
logging.level.com.klu=INFO
logging.level.org.springframework.security=INFO
logging.file.name=logs/safenest.log
logging.file.max-size=10MB
logging.file.max-history=10

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=${ADMIN_PASSWORD:}

# CORS Configuration
server.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Actuator Configuration (for monitoring)
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=when-authorized
